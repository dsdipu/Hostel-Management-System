<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hostel Management System</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2);
            font-family: Arial, sans-serif;
        }
        .container {
            text-align: center;
            background: white;
            padding: 50px;
            border-radius: 20px;
        }
        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 30px;
            margin-top: 20px;
        }
        .btn:hover { background: #764ba2; }
        .error { color: red; font-size: 12px; margin-top: 15px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏠 Hostel Management System</h1>
        <p>Click below to open the application</p>
        <button class="btn" onclick="openLocal()">Launch Application</button>
        <div id="error" class="error">
            ⚠️ XAMPP not detected. Please install XAMPP and start Apache & MySQL.
        </div>
    </div>

    <script>
        function openLocal() {
            window.location.href = "sql207.infinityfree.com/index.php";
            setTimeout(function() {
                document.getElementById('error').style.display = 'block';
            }, 2000);
        }
    </script>
</body>
</html>
