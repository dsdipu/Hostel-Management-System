<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex">

    <!-- Sidebar -->
    <div class="w-64 bg-green-600 text-white min-h-screen p-5">
        <h2 class="text-2xl font-bold mb-6">Admin Panel</h2>
        <ul class="space-y-3">
            <li><a href="adminDashboard.html" class="block hover:bg-blue-700 p-2 rounded">Dashboard</a></li>
            <li><a href="adminStudents.html" class="block hover:bg-blue-700 p-2 rounded">Students</a></li>
            <li><a href="adminRooms.html" class="block hover:bg-blue-700 p-2 rounded">Rooms</a></li>
            <li><a href="adminPayments.html" class="block bg-blue-700 p-2 rounded">Payments</a></li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="flex-1 p-6">

        <h1 class="text-3xl font-bold mb-6">Payment Management</h1>

        <!-- Add Payment Form -->
        <div class="bg-white p-5 rounded shadow mb-6">
            <h2 class="text-xl font-semibold mb-4">Record Payment</h2>

            <form class="grid grid-cols-1 md:grid-cols-4 gap-4">
                
                <input type="text" placeholder="Student ID" class="border p-2 rounded">

                <input type="text" placeholder="Month (e.g. June)" class="border p-2 rounded">

                <input type="number" placeholder="Amount" class="border p-2 rounded">

                <select class="border p-2 rounded">
                    <option>Paid</option>
                    <option>Pending</option>
                </select>

                <button class="bg-blue-500 text-white p-2 rounded hover:bg-blue-600 md:col-span-4">
                    Add Payment
                </button>

            </form>
        </div>

        <!-- Payment Table -->
        <div class="bg-white p-5 rounded shadow">
            <h2 class="text-xl font-semibold mb-4">Payment History</h2>

            <table class="w-full border border-gray-300">
                <thead class="bg-gray-200">
                    <tr>
                        <th class="p-2 border">Student ID</th>
                        <th class="p-2 border">Month</th>
                        <th class="p-2 border">Amount</th>
                        <th class="p-2 border">Status</th>
                    </tr>
                </thead>

                <tbody>
                    <tr>
                        <td class="p-2 border">S101</td>
                        <td class="p-2 border">June</td>
                        <td class="p-2 border">2000</td>
                        <td class="p-2 border text-green-500">Paid</td>
                    </tr>

                    <tr>
                        <td class="p-2 border">S102</td>
                        <td class="p-2 border">June</td>
                        <td class="p-2 border">2000</td>
                        <td class="p-2 border text-red-500">Pending</td>
                    </tr>
                </tbody>
            </table>

        </div>

    </div>

</body>
</html>
