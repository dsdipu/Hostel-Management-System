<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMS | Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex">

    
    <div class="w-64 bg-green-600 text-white min-h-screen p-5">
        <h2 class="text-2xl font-bold mb-6">Admin Panel</h2>
        <ul class="space-y-3">
            <li><a href="#" class="block hover:bg-blue-700 p-2 rounded">Dashboard</a></li>
            <li><a href="admin_students.html" class="block hover:bg-blue-700 p-2 rounded">Students</a></li>
            <li><a href="admin_rooms.html" class="block hover:bg-blue-700 p-2 rounded">Rooms</a></li>
            <li><a href="admin_payments.html" class="block hover:bg-blue-700 p-2 rounded">Payments</a></li>
        </ul>
    </div>

    <div class="flex-1 p-6">

        <h1 class="text-3xl font-bold mb-6">Dashboard</h1>


        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">

            <div class="bg-white p-5 rounded shadow">
                <h3 class="text-gray-500">Total Students</h3>
                <p class="text-2xl font-bold">120</p>
            </div>

            <div class="bg-white p-5 rounded shadow">
                <h3 class="text-gray-500">Total Rooms</h3>
                <p class="text-2xl font-bold">40</p>
            </div>

            <div class="bg-white p-5 rounded shadow">
                <h3 class="text-gray-500">Pending Payments</h3>
                <p class="text-2xl font-bold text-red-500">15</p>
            </div>

        </div>


        <div class="bg-white p-5 rounded shadow">
            <h2 class="text-xl font-semibold mb-4">Recent Students</h2>

            <table class="w-full border border-gray-300">
                <thead class="bg-gray-200">
                    <tr>
                        <th class="p-2 border">Name</th>
                        <th class="p-2 border">Room</th>
                        <th class="p-2 border">Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="p-2 border">Rahim</td>
                        <td class="p-2 border">101</td>
                        <td class="p-2 border text-green-500">Paid</td>
                    </tr>
                    <tr>
                        <td class="p-2 border">Karim</td>
                        <td class="p-2 border">102</td>
                        <td class="p-2 border text-red-500">Pending</td>
                    </tr>
                </tbody>
            </table>

        </div>

    </div>

</body>
</html>
